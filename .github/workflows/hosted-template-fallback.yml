name: Hosted Template Blog Fallback

on:
  workflow_dispatch:
    inputs:
      force:
        description: Force publish even if a blog post already exists for today's KST date
        required: false
        default: "0"
  schedule:
    - cron: "27 23 * * *"
    - cron: "57 1 * * *"
    - cron: "23 4 * * *"
    - cron: "49 6 * * *"
    - cron: "21 9 * * *"
    - cron: "7 12 * * *"

permissions:
  contents: write

concurrency:
  group: hosted-template-blog-fallback
  cancel-in-progress: false

jobs:
  fallback:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      SITE_BASE: https://jiggyj744-ctrl.github.io
      GENERATION_MODE: template
      PUBLISH_SCOPE: blog
      PUBLISH_LIMIT: "1"
      FORCE_PUBLISH: ${{ github.event.inputs.force || '0' }}
      PUBLISH_JITTER_MAX_SECONDS: ${{ github.event_name == 'schedule' && '2700' || '0' }}
      ALLOW_TEMPLATE_ON_PROXY_FAILURE: "1"
    steps:
      - name: Select fallback catch-up slot
        id: fallback_slot
        shell: bash
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "should_publish=1" >> "$GITHUB_OUTPUT"
            echo "reason=manual" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          case "${{ github.event.schedule }}" in
            "27 23 * * *") current_slot=0 ;;
            "57 1 * * *") current_slot=1 ;;
            "23 4 * * *") current_slot=2 ;;
            "49 6 * * *") current_slot=3 ;;
            "21 9 * * *") current_slot=4 ;;
            "7 12 * * *") current_slot=5 ;;
            *) current_slot=-1 ;;
          esac

          kst_date="$(TZ=Asia/Seoul date +%F)"
          checksum="$(printf '%s' "$kst_date" | cksum)"
          checksum="${checksum%% *}"
          selected_slot=$((checksum % 5))

          if [ "$current_slot" -ge "$selected_slot" ]; then
            echo "should_publish=1" >> "$GITHUB_OUTPUT"
            echo "reason=catchup-slot-$current_slot-selected-$selected_slot" >> "$GITHUB_OUTPUT"
          else
            echo "should_publish=0" >> "$GITHUB_OUTPUT"
            echo "reason=wait-slot-$current_slot-selected-$selected_slot" >> "$GITHUB_OUTPUT"
          fi
          echo "KST date=$kst_date current_slot=$current_slot selected_slot=$selected_slot"

      - uses: actions/checkout@v4
        if: steps.fallback_slot.outputs.should_publish == '1'
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-node@v4
        if: steps.fallback_slot.outputs.should_publish == '1'
        with:
          node-version: 22
      - name: Run template fallback publisher
        if: steps.fallback_slot.outputs.should_publish == '1'
        shell: bash
        run: |
          export JAUCTION_REPO_DIR="$GITHUB_WORKSPACE"
          export GIT_AUTHOR_NAME="github-actions[bot]"
          export GIT_AUTHOR_EMAIL="41898282+github-actions[bot]@users.noreply.github.com"
          bash ops/vm109-share-blog-publisher.sh
