name: Continuous Share Blog Publishing

on:
  workflow_dispatch:
    inputs:
      pages:
        description: Pages to publish in this run
        required: false
        default: "1"
      force:
        description: Force publish even if a blog post already exists for today's KST date
        required: false
        default: "0"
      proxy_base_url:
        description: Optional OpenAI-compatible Gemini proxy base URL
        required: false
        default: ""
  schedule:
    - cron: "17 23 * * *"
    - cron: "43 1 * * *"
    - cron: "11 4 * * *"
    - cron: "37 6 * * *"
    - cron: "9 9 * * *"
    - cron: "51 12 * * *"

permissions:
  contents: write

concurrency:
  group: continuous-share-indexing
  cancel-in-progress: false

jobs:
  publish:
    runs-on: [self-hosted, vm109]
    timeout-minutes: 30
    env:
      SITE_BASE: https://jiggyj744-ctrl.github.io
      GENERATION_MODE: proxy
      LLM_PROXY_BASE_URL: ${{ github.event.inputs.proxy_base_url || vars.LLM_PROXY_BASE_URL || 'http://127.0.0.1:8302/v1' }}
      LLM_PROXY_API_KEY: ${{ secrets.LLM_PROXY_API_KEY }}
      LLM_PROXY_MODEL: ${{ vars.LLM_PROXY_MODEL || 'gemini-pro' }}
      PUBLISH_LIMIT: ${{ github.event.inputs.pages || '1' }}
      FORCE_PUBLISH: ${{ github.event.inputs.force || '0' }}
      PUBLISH_JITTER_MAX_SECONDS: ${{ github.event_name == 'schedule' && '1800' || '0' }}
    steps:
      - name: Select daily publish slot
        id: publish_slot
        shell: bash
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "should_publish=1" >> "$GITHUB_OUTPUT"
            echo "reason=manual" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          case "${{ github.event.schedule }}" in
            "17 23 * * *") current_slot=0 ;;
            "43 1 * * *") current_slot=1 ;;
            "11 4 * * *") current_slot=2 ;;
            "37 6 * * *") current_slot=3 ;;
            "9 9 * * *") current_slot=4 ;;
            "51 12 * * *") current_slot=5 ;;
            *) current_slot=-1 ;;
          esac

          kst_date="$(TZ=Asia/Seoul date +%F)"
          checksum="$(printf '%s' "$kst_date" | cksum)"
          checksum="${checksum%% *}"
          selected_slot=$((checksum % 6))

          if [ "$current_slot" = "$selected_slot" ]; then
            echo "should_publish=1" >> "$GITHUB_OUTPUT"
            echo "reason=selected-slot-$selected_slot" >> "$GITHUB_OUTPUT"
          else
            echo "should_publish=0" >> "$GITHUB_OUTPUT"
            echo "reason=skip-slot-$current_slot-selected-$selected_slot" >> "$GITHUB_OUTPUT"
          fi
          echo "KST date=$kst_date current_slot=$current_slot selected_slot=$selected_slot"

      - uses: actions/checkout@v4
        if: steps.publish_slot.outputs.should_publish == '1'
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-node@v4
        if: steps.publish_slot.outputs.should_publish == '1'
        with:
          node-version: 22
      - name: Run guarded share blog publisher
        if: steps.publish_slot.outputs.should_publish == '1'
        shell: bash
        run: |
          export JAUCTION_REPO_DIR="$GITHUB_WORKSPACE"
          export GIT_AUTHOR_NAME="github-actions[bot]"
          export GIT_AUTHOR_EMAIL="41898282+github-actions[bot]@users.noreply.github.com"
          bash ops/vm109-share-blog-publisher.sh
