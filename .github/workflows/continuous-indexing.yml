name: Continuous Share Indexing

on:
  workflow_dispatch:
    inputs:
      pages:
        description: Pages to publish in this run
        required: false
        default: "1"
  schedule:
    - cron: "12 18 * * *"

permissions:
  contents: write

concurrency:
  group: continuous-share-indexing
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Generate share acquisition SEO pages
        env:
          SITE_BASE: https://jiggyj744-ctrl.github.io
          GENERATION_MODE: template
        run: node scripts/seo-content-engine.mjs --limit "${{ github.event.inputs.pages || '1' }}"
      - name: Verify static site
        run: node tools/verify_site.mjs
      - name: Commit generated pages
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .
            git commit -m "Publish continuous share acquisition index pages"
            git push
          else
            echo "No generated changes"
          fi
