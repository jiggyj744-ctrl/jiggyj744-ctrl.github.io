name: Continuous Share Blog Publishing

on:
  workflow_dispatch:
    inputs:
      pages:
        description: Pages to publish in this run
        required: false
        default: "1"
      proxy_base_url:
        description: Optional OpenAI-compatible Gemini proxy base URL
        required: false
        default: ""
  schedule:
    - cron: "17 23 * * *"
    - cron: "43 1 * * *"
    - cron: "11 4 * * *"
    - cron: "37 6 * * *"
    - cron: "9 9 * * *"
    - cron: "51 12 * * *"

permissions:
  contents: write

concurrency:
  group: continuous-share-indexing
  cancel-in-progress: false

jobs:
  publish:
    runs-on: self-hosted
    timeout-minutes: 30
    env:
      SITE_BASE: https://jiggyj744-ctrl.github.io
      GENERATION_MODE: proxy
      LLM_PROXY_BASE_URL: ${{ github.event.inputs.proxy_base_url || vars.LLM_PROXY_BASE_URL || 'http://127.0.0.1:8302/v1' }}
      LLM_PROXY_API_KEY: ${{ secrets.LLM_PROXY_API_KEY }}
      LLM_PROXY_MODEL: ${{ vars.LLM_PROXY_MODEL || 'gemini-pro' }}
    steps:
      - name: Select daily publish slot
        id: publish_slot
        shell: bash
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "should_publish=1" >> "$GITHUB_OUTPUT"
            echo "reason=manual" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          case "${{ github.event.schedule }}" in
            "17 23 * * *") current_slot=0 ;;
            "43 1 * * *") current_slot=1 ;;
            "11 4 * * *") current_slot=2 ;;
            "37 6 * * *") current_slot=3 ;;
            "9 9 * * *") current_slot=4 ;;
            "51 12 * * *") current_slot=5 ;;
            *) current_slot=-1 ;;
          esac

          kst_date="$(TZ=Asia/Seoul date +%F)"
          checksum="$(printf '%s' "$kst_date" | cksum)"
          checksum="${checksum%% *}"
          selected_slot=$((checksum % 6))

          if [ "$current_slot" = "$selected_slot" ]; then
            echo "should_publish=1" >> "$GITHUB_OUTPUT"
            echo "reason=selected-slot-$selected_slot" >> "$GITHUB_OUTPUT"
          else
            echo "should_publish=0" >> "$GITHUB_OUTPUT"
            echo "reason=skip-slot-$current_slot-selected-$selected_slot" >> "$GITHUB_OUTPUT"
          fi
          echo "KST date=$kst_date current_slot=$current_slot selected_slot=$selected_slot"

      - uses: actions/checkout@v4
        if: steps.publish_slot.outputs.should_publish == '1'
      - uses: actions/setup-node@v4
        if: steps.publish_slot.outputs.should_publish == '1'
        with:
          node-version: 22
      - name: Prevent duplicate daily blog publish
        id: daily_guard
        if: steps.publish_slot.outputs.should_publish == '1'
        shell: bash
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "should_continue=1" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          node --input-type=module <<'NODE'
          import fs from "node:fs";
          function kstDate(value) {
            const date = value ? new Date(value) : new Date();
            const parts = new Intl.DateTimeFormat("en-US", {
              timeZone: "Asia/Seoul",
              year: "numeric",
              month: "2-digit",
              day: "2-digit"
            }).formatToParts(date).reduce((acc, part) => {
              if (part.type !== "literal") acc[part.type] = part.value;
              return acc;
            }, {});
            return `${parts.year}-${parts.month}-${parts.day}`;
          }
          const today = kstDate();
          const state = fs.existsSync("ops/index-state.json")
            ? JSON.parse(fs.readFileSync("ops/index-state.json", "utf8"))
            : { runs: [] };
          const alreadyPublished = (state.runs || []).some((run) =>
            kstDate(run.date) === today &&
            Array.isArray(run.pages) &&
            run.pages.some((page) => String(page).startsWith("blog/"))
          );
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `should_continue=${alreadyPublished ? "0" : "1"}\n`);
          console.log(alreadyPublished ? `blog already published for ${today}` : `blog publish allowed for ${today}`);
          NODE
      - name: Verify Gemini proxy route
        if: steps.publish_slot.outputs.should_publish == '1' && steps.daily_guard.outputs.should_continue == '1'
        shell: bash
        run: |
          test -n "$LLM_PROXY_BASE_URL" || { echo "LLM_PROXY_BASE_URL is required"; exit 1; }
          test -n "$LLM_PROXY_API_KEY" || { echo "LLM_PROXY_API_KEY secret is required"; exit 1; }
          node --input-type=module <<'NODE'
          const baseUrl = process.env.LLM_PROXY_BASE_URL.replace(/\/$/, "");
          const healthBase = baseUrl.replace(/\/v1$/, "");
          const headers = {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + process.env.LLM_PROXY_API_KEY
          };
          const health = await fetch(healthBase + "/health", { headers });
          if (!health.ok) {
            console.error("Gemini proxy health failed: " + health.status + " " + await health.text());
            process.exit(1);
          }
          const completion = await fetch(baseUrl + "/chat/completions", {
            method: "POST",
            headers,
            body: JSON.stringify({
              model: process.env.LLM_PROXY_MODEL,
              messages: [{ role: "user", content: "Return one short JSON object confirming the route is online." }],
              temperature: 0,
              max_tokens: 128,
              response_format: { type: "json_object" }
            })
          });
          if (!completion.ok) {
            console.error("Gemini proxy completion failed: " + completion.status + " " + await completion.text());
            process.exit(1);
          }
          const data = await completion.json();
          const text = data.choices?.[0]?.message?.content || data.output_text || "";
          if (!text.trim()) {
            console.error("Gemini proxy returned an empty completion");
            process.exit(1);
          }
          console.log("Gemini proxy completion route OK via " + process.env.LLM_PROXY_MODEL);
          NODE
      - name: Generate share acquisition SEO pages
        if: steps.publish_slot.outputs.should_publish == '1' && steps.daily_guard.outputs.should_continue == '1'
        run: node scripts/seo-content-engine.mjs --limit "${{ github.event.inputs.pages || '1' }}"
      - name: Verify static site
        if: steps.publish_slot.outputs.should_publish == '1' && steps.daily_guard.outputs.should_continue == '1'
        run: node tools/verify_site.mjs
      - name: Commit generated pages
        if: steps.publish_slot.outputs.should_publish == '1' && steps.daily_guard.outputs.should_continue == '1'
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .
            git commit -m "Publish continuous share acquisition index pages"
            git push
          else
            echo "No generated changes"
          fi
